name: Deploy to Firebase Hosting

on:
  workflow_run:
    workflows: ["Update PropertyPulse Daily"]
    types:
      - completed
  push:
    branches:
      - main  # keep this so manual pushes still trigger it

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # No build step needed — HTML is already generated by scrape.py
      # and committed to the repo by update.yml before this runs.

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: newzip-propertypulse
          force: true