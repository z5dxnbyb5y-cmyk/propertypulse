name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main   # fires after every scraper auto-commit and any manual push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # No build step needed — HTML is already generated by scrape.py
      # and committed to the repo by update.yml before this runs.

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: newzip-propertypulse