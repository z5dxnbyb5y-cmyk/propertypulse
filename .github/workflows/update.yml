name: Update PropertyPulse Daily

on:
  schedule:
    # Runs at 9:00 AM ET (14:00 UTC) every weekday
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml openpyxl

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated index.html
        run: |
          git config user.name "PropertyPulse Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
