name: Update PropertyPulse Daily

on:
  schedule:
    # Runs every day at 9:00 AM ET (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:   # also allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scrape.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FANNIE_CLIENT_ID: ${{ secrets.FANNIE_CLIENT_ID }}
          FANNIE_CLIENT_SECRET: ${{ secrets.FANNIE_CLIENT_SECRET }}

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
